name: VisitUs MLOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mlops-flow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: |
          pip install pandas scikit-learn xgboost huggingface_hub mlflow joblib
          find . -name "requirements.txt" -exec pip install -r {} \;

      - name: Execute MLOps Steps
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Ensure directories exist for the runner
          mkdir -p backend/model_building
          
          # Sequential execution
          echo "Registering Data..."
          python backend/model_building/data_register.py
          
          echo "Preparing Data..."
          python backend/model_building/prep.py
          
          echo "Training Model..."
          python backend/model_building/train.py
          
          echo "Deploying..."
          python hosting.py