name: MLOps Pipeline - VisitUs

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r backend/model_building/requirements.txt
      - name: Register Data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python backend/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r backend/model_building/requirements.txt
      - name: Prepare Data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python backend/model_building/prep.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: pip install -r backend/model_building/requirements.txt
      - name: Train Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Force MLflow to use local filesystem and bypass remote artifact storage
          MLFLOW_TRACKING_URI: "file:///home/runner/work/visitusmlops/visitusmlops/mlruns"
          MLFLOW_ARTIFACT_URI: "file:///home/runner/work/visitusmlops/visitusmlops/mlruns"
        run: python backend/model_building/train.py
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: backend/model_building/visitus_xgb_model.joblib

  deploy-hosting:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: backend/model_building/
      - name: Install Dependencies
        run: |
          pip install huggingface_hub
          if [ -f backend/deployment/requirements.txt ]; then pip install -r backend/deployment/requirements.txt; fi
      - name: Deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python hosting.py